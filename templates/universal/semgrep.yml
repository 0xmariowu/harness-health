name: Semgrep

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Semgrep
        run: pip install 'semgrep>=1.75.0'

      - name: Run Semgrep
        run: semgrep scan --config p/default --error
