name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # `git merge-base --is-ancestor` below needs full history of the
          # tag commit and origin/main; default depth=1 gives a false negative.
          fetch-depth: 0

      # Refuse to publish a tag whose commit is not already on origin/main.
      # Without this, anyone with tag-push permission could trigger a
      # GitHub Release from a commit that never passed main's required CI.
      - name: Verify tag SHA is an ancestor of origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME points at $GITHUB_SHA, which is NOT an ancestor of origin/main."
            echo "::error::Refusing to publish from an unmerged commit. Cherry-pick / merge to main first, then re-tag."
            exit 1
          fi
          echo "Tag SHA is an ancestor of origin/main; ancestor gate passes."

      # Require every check-runs context that branch-protection requires
      # on `main` to have reported `success` on the tag SHA. A tag push
      # bypasses branch protection by design, so this gate restores the
      # same contract on the tag flow. Required contexts come from (in
      # order): `.github/branch-protection.yml`, the live branch
      # protection API, then a fail-closed error unless explicitly opted out.
      - name: Verify required CI checks passed on tag SHA
        env:
          GH_TOKEN: ${{ github.token }}
          AGENTLINT_RELEASE_GATE_OPT_OUT: ${{ vars.AGENTLINT_RELEASE_GATE_OPT_OUT }}
        run: |
          set -euo pipefail

          REQUIRED=()
          if [ -f .github/branch-protection.yml ]; then
            mapfile -t REQUIRED < <(python3 - <<'PY'
          path = '.github/branch-protection.yml'
          in_contexts = False
          with open(path, encoding='utf-8') as f:
              for raw in f:
                  line = raw.rstrip()
                  s = line.strip()
                  if s.startswith('#') or not s:
                      continue
                  if s.startswith('contexts:'):
                      in_contexts = True
                      continue
                  if in_contexts and s.startswith('- '):
                      print(s[2:].strip())
                  elif in_contexts and not line.startswith(' '):
                      in_contexts = False
          PY
            )
            echo "Required contexts (from .github/branch-protection.yml): ${#REQUIRED[@]}"
          fi

          if [ "${#REQUIRED[@]}" -eq 0 ]; then
            api_contexts=$(gh api "repos/$GITHUB_REPOSITORY/branches/main/protection" \
              --jq '.required_status_checks.contexts // [] | .[]' 2>/dev/null || true)
            if [ -n "$api_contexts" ]; then
              mapfile -t REQUIRED <<< "$api_contexts"
              echo "Required contexts (from branch protection API): ${#REQUIRED[@]}"
            fi
          fi

          if [ "${#REQUIRED[@]}" -eq 0 ]; then
            if [ "${AGENTLINT_RELEASE_GATE_OPT_OUT:-0}" = "1" ]; then
              echo "::warning::No required CI contexts declared for main; AGENTLINT_RELEASE_GATE_OPT_OUT=1 set, bypassing required-checks gate (rely on the ancestor gate above)."
              exit 0
            fi
            echo "::error::No required CI contexts declared for main. Refusing to publish without a check-runs gate."
            echo "::error::Either configure required status checks (add .github/branch-protection.yml + apply via 'gh api -X PATCH /repos/$GITHUB_REPOSITORY/branches/main/protection'), or set repo variable AGENTLINT_RELEASE_GATE_OPT_OUT=1 to explicitly skip this gate."
            exit 1
          fi
          echo "Required contexts: ${REQUIRED[*]}"

          # Fetch every check-run for this SHA in pages of 100.
          fetch_runs_for_sha() {
            local sha="$1" page=1 rows="" chunk count
            while :; do
              chunk=$(gh api "repos/$GITHUB_REPOSITORY/commits/$sha/check-runs?per_page=100&page=$page" \
                --jq '.check_runs[] | "\(.name)\t\(.conclusion // "pending")"')
              [ -z "$chunk" ] && break
              rows="${rows}${chunk}"$'\n'
              count=$(printf '%s\n' "$chunk" | wc -l | tr -d ' ')
              [ "$count" -lt 100 ] && break
              page=$((page + 1))
            done
            printf '%s' "$rows"
          }

          # Resolve a required context against fetched rows. Accepts an
          # exact name or any matrix child whose name starts with `$name (`
          # so required `lint` is satisfied by `lint (20)` / `lint (22)`.
          resolve_required() {
            local rows="$1" name="$2" prefix="${name} (" result="missing"
            while IFS=$'\t' read -r run_name conclusion; do
              [ -z "$run_name" ] && continue
              if [ "$run_name" = "$name" ] || [ "${run_name#"$prefix"}" != "$run_name" ]; then
                if [ "$conclusion" = "success" ]; then
                  echo "success"; return
                fi
                if [ "$conclusion" = "pending" ] || [ -z "$conclusion" ]; then
                  result="pending"
                elif [ "$result" != "pending" ]; then
                  result="$conclusion"
                fi
              fi
            done < <(printf '%s' "$rows")
            echo "$result"
          }

          # Try up to 20 attempts × 30s = ~10 min so a concurrent CI job
          # on the same SHA has time to land. Squash-merges occasionally
          # don't fire `push` events for the new main commit, leaving the
          # tag SHA with no check-runs — fall back to the parent SHA only
          # to fill gaps (a recorded failure on the tag SHA wins).
          attempt=1
          max_attempts=20
          while :; do
            tag_rows=$(fetch_runs_for_sha "$GITHUB_SHA")
            parent=$(git rev-parse "${GITHUB_SHA}^" 2>/dev/null || echo "")
            parent_rows=""
            [ -n "$parent" ] && parent_rows=$(fetch_runs_for_sha "$parent")

            missing=(); failed=(); pending=()
            for name in "${REQUIRED[@]}"; do
              status=$(resolve_required "$tag_rows" "$name")
              if [ "$status" = "missing" ] && [ -n "$parent_rows" ]; then
                status=$(resolve_required "$parent_rows" "$name")
              fi
              case "$status" in
                success) ;;
                missing) missing+=("$name") ;;
                pending) pending+=("$name") ;;
                *)       failed+=("$name=$status") ;;
              esac
            done

            if [ "${#missing[@]}" -eq 0 ] && [ "${#failed[@]}" -eq 0 ] && [ "${#pending[@]}" -eq 0 ]; then
              echo "All ${#REQUIRED[@]} required CI checks reported success."
              break
            fi

            if [ "${#failed[@]}" -gt 0 ]; then
              echo "::error::Required-checks gate failed (attempt ${attempt}) for tag $GITHUB_REF_NAME on SHA $GITHUB_SHA"
              echo "::error::Non-success required checks: ${failed[*]}"
              [ "${#missing[@]}" -gt 0 ] && echo "::error::Also missing: ${missing[*]}"
              [ "${#pending[@]}" -gt 0 ] && echo "::error::Also pending: ${pending[*]}"
              exit 1
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Required-checks gate timed out after ${attempt} attempts for tag $GITHUB_REF_NAME on SHA $GITHUB_SHA"
              [ "${#missing[@]}" -gt 0 ] && echo "::error::Still missing: ${missing[*]}"
              [ "${#pending[@]}" -gt 0 ] && echo "::error::Still pending: ${pending[*]}"
              exit 1
            fi

            echo "::notice::Required-checks gate attempt ${attempt}/${max_attempts}: missing=${#missing[@]} pending=${#pending[@]}; sleeping 30s before retry"
            attempt=$((attempt + 1))
            sleep 30
          done

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag format
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid tag format: $TAG (expected vX.Y.Z)"
            exit 1
          fi

      - name: Validate tag matches source version
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Try package.json
          if [ -f package.json ]; then
            PKG_VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "")
            if [ -n "$PKG_VERSION" ] && [ "$PKG_VERSION" != "undefined" ]; then
              if [ "$VERSION" != "$PKG_VERSION" ]; then
                echo "::error::Tag v$VERSION does not match package.json version $PKG_VERSION"
                exit 1
              fi
              echo "Validated: tag matches package.json ($VERSION)"
              exit 0
            fi
          fi

          # Try pyproject.toml
          if [ -f pyproject.toml ]; then
            PY_VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              d = tomllib.load(f)
          print(d.get('project', {}).get('version', ''))
          " 2>/dev/null || echo "")
            if [ -n "$PY_VERSION" ]; then
              if [ "$VERSION" != "$PY_VERSION" ]; then
                echo "::error::Tag v$VERSION does not match pyproject.toml version $PY_VERSION"
                exit 1
              fi
              echo "Validated: tag matches pyproject.toml ($VERSION)"
              exit 0
            fi
          fi

          echo "::warning::No version file found — skipping version match validation"

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Escape dots for awk regex (1.2.3 -> 1\.2\.3)
          SAFE_VERSION="${VERSION//./\\.}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            # Match "## vX.Y.Z" or "## X.Y.Z" optionally followed by space+anything.
            # Stop at the next "## v?X.Y.Z" heading (either style).
            NOTES=$(awk "/^## v?${SAFE_VERSION}([[:space:]]|$)/{found=1; next} /^## v?[0-9]/{if(found) exit} found" CHANGELOG.md | awk 'NF{p=1} p')
          fi
          if [ -n "$NOTES" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "$NOTES" > /tmp/release-notes.md
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          REPO_NAME="${{ github.event.repository.name }}"
          if [ "${{ steps.changelog.outputs.found }}" == "true" ]; then
            gh release create "$TAG" --title "${REPO_NAME} ${VERSION}" --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" --title "${REPO_NAME} ${VERSION}" --generate-notes
          fi

      - name: Comment on closed issues referenced in CHANGELOG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          SAFE_VERSION="${VERSION//./\\.}"

          if [ ! -f CHANGELOG.md ]; then
            echo "::warning::CHANGELOG.md not found; skipping issue notification"
            exit 0
          fi

          # Match both "## X.Y.Z" and "## vX.Y.Z" CHANGELOG heading styles.
          SECTION=$(awk "/^## v?${SAFE_VERSION}([[:space:]]|$)/{f=1;next} /^## v?[0-9]/{f=0} f" CHANGELOG.md)
          if [ -z "$SECTION" ]; then
            echo "No CHANGELOG section for ${VERSION}; skipping issue notification"
            exit 0
          fi

          ISSUES=$(printf '%s\n' "$SECTION" | grep -oE '#[0-9]+' | sort -u | tr -d '#')
          if [ -z "$ISSUES" ]; then
            echo "No issues referenced in ${VERSION} CHANGELOG; nothing to notify"
            exit 0
          fi

          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"
          BODY=$(printf '%s\n\n%s\n' \
            "Shipped in [${VERSION}](${RELEASE_URL})." \
            "If anything here regressed or you hit a follow-up issue, reopen this or file a new one.")

          for num in $ISSUES; do
            TYPE=$(gh api "repos/${{ github.repository }}/issues/${num}" --jq 'if .pull_request then "pr" else "issue" end' 2>/dev/null || echo "missing")
            case "$TYPE" in
              issue)
                echo "Commenting on #${num}"
                gh issue comment "$num" --repo "${{ github.repository }}" --body "$BODY" \
                  || echo "::warning::Failed to post comment on #${num}"
                ;;
              pr)
                echo "Skipping #${num} (PR, not an issue)"
                ;;
              missing)
                echo "::warning::Cannot resolve #${num}; skipping"
                ;;
            esac
          done

      - name: Summary
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "## Released ${VERSION}"
            echo "- GitHub Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"
          } >> "$GITHUB_STEP_SUMMARY"
