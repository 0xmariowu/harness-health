name: CI (cross-platform)

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-xplatform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - 20
          - 22
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Toolchain versions
        shell: bash
        run: |
          echo "RUNNER_OS=$RUNNER_OS"
          node --version
          npm --version
          git --version

      - name: Install dependencies
        shell: bash
        run: npm ci || npm install

      - name: Run project tests
        shell: bash
        run: |
          # Default: whatever the package defines as `test`.
          # Replace with `npm run test:ci`, `pnpm -w test`, `bun test`, etc. as needed.
          npm test
