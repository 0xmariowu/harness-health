name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: One sentence describing the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Shortest steps to trigger the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "HH version (check plugin.json) or commit hash"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      description: "e.g., macOS 15.4, Ubuntu 24.04"
    validations:
      required: true
