repository: 0xmariowu/AgentLint
branch: main
required_status_checks:
  strict: true
  # Names match the actual check-runs CI emits on `push: main` events.
  #
  # 2026-04-26 (v1.1.12 F003): re-added `CodeQL` and `check-test-pairing`
  # to align this YAML with live main protection. Earlier versions had
  # removed them because neither produces a check-run on tag SHAs (so
  # release.yml's required-checks gate could never satisfy them on a
  # tag push). Two changes since make the re-addition safe:
  #   1. release.yml's required-checks step now does parent-SHA fallback
  #      (v1.1.8 PR #213) — when the tag SHA itself has no matching
  #      check-run, it falls back to the parent commit's check-runs.
  #      That covers `CodeQL` and `check-test-pairing` because both
  #      ARE emitted on the parent (squash-merge target) commit.
  #   2. `bash scripts/setup-branch-protection.sh --verify` now
  #      runs in the local release gate; with these two contexts in
  #      the YAML, --verify reports clean against live main.
  # If a future audit shows the parent-SHA fallback is unreliable,
  # remove these two and accept the YAML/live drift trade-off again.
  contexts:
    - test (ubuntu-latest, 20)
    - test (ubuntu-latest, 22)
    - test (macos-latest, 20)
    - test (macos-latest, 22)
    - test (windows-latest, 20)
    - test (windows-latest, 22)
    - npm-e2e (ubuntu-latest)
    - npm-e2e (macos-latest)
    - npm-e2e (windows-latest)
    - lint
    - analyze
    - CodeQL
    - Semgrep
    - scan
    - check-test-pairing
