repository: 0xmariowu/AgentLint
branch: main
required_status_checks:
  strict: true
  # Names match live remote protection (queried 2026-04-26 via
  # `gh api repos/.../branches/main/protection --jq .required_status_checks.contexts`).
  # Keep this list in sync with the live configuration so release.yml's
  # P0-2-tag Checks-API gate can resolve every required check on a tag SHA.
  contexts:
    - test (ubuntu-latest, 20)
    - test (ubuntu-latest, 22)
    - test (macos-latest, 20)
    - test (macos-latest, 22)
    - test (windows-latest, 20)
    - test (windows-latest, 22)
    - npm-e2e (ubuntu-latest)
    - npm-e2e (macos-latest)
    - npm-e2e (windows-latest)
    - lint
    - check-test-pairing
    - analyze
    - CodeQL
    - Semgrep
    - scan
