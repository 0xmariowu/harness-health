name: Semgrep

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Semgrep
        run: pip install 'semgrep>=1.75.0'

      - name: Run Semgrep
        run: semgrep scan --config p/default --error
