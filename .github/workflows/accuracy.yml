name: Accuracy

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/scanner.sh'
      - 'tests/accuracy/**'
      - '.github/workflows/accuracy.yml'

permissions:
  contents: read

jobs:
  accuracy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 20

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download corpus tarball
        id: download
        run: |
          # Fail closed if the corpus can't be downloaded. Previously this
          # step emitted a warning and set found=false, causing every
          # downstream step to skip — a missing corpus silently turned
          # the whole accuracy gate into a green no-op. For a PR that
          # touches scanner rules, "I couldn't check accuracy" must be
          # an error, not a pass.
          if ! gh release download corpus-v1 \
            --pattern 'corpus-full.tar.gz' \
            --dir /tmp \
            --repo ${{ github.repository }}; then
            echo "::error::Corpus tarball not found at corpus-v1 release. " \
              "Accuracy gate requires the corpus; either publish it or mark " \
              "the PR as not-touching scanner rules." >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Reconstruct repos
        run: |
          mkdir -p /tmp/corpus-raw /tmp/corpus-repos
          tar -xzf /tmp/corpus-full.tar.gz -C /tmp/corpus-raw

          # Reconstruct in parallel (4 workers).
          # "$1" inside single quotes is intentional — expansion happens in the child bash.
          # shellcheck disable=SC2016
          find /tmp/corpus-raw -mindepth 1 -maxdepth 1 -type d -print0 | \
            xargs -0 -P 4 -I{} bash -c 'bash tests/docker-e2e/reconstruct-repo.sh "$1" "/tmp/corpus-repos/$(basename "$1")"' _ {}

          echo "Reconstructed $(find /tmp/corpus-repos -mindepth 1 -maxdepth 1 -type d | wc -l) repos"

      - name: Run scanner on all repos
        run: |
          # Previously this loop wrapped scanner with `2>/dev/null || true`
          # — scanner crashes (missing jq / evidence.json / invalid repo)
          # became silent zero-result contributions. Accuracy compare then
          # reported a score based on an incomplete sample. Now: capture
          # per-repo stderr, count failures, and fail the step if more
          # than 10% of the corpus fails to scan.
          RESULTS=/tmp/scanner-results.jsonl
          FAILS=/tmp/scanner-failures.log
          WORK_DIR="$(mktemp -d /tmp/scanner-work-XXXXXX)"
          : > "$RESULTS"
          : > "$FAILS"
          total=0
          fails=0
          PARALLEL=8

          scan_one() {
            local repo_dir="$1"
            local name
            local result_file
            local fail_file
            local err_file
            local status

            name="$(basename "$repo_dir")"
            result_file="$WORK_DIR/$name.jsonl"
            fail_file="$WORK_DIR/$name.fail"
            err_file="$WORK_DIR/$name.stderr"

            status=0
            bash src/scanner.sh --project-dir "$repo_dir" \
              > "$result_file" 2> "$err_file" || status=$?

            if [ "$status" -ne 0 ]; then
              {
                echo "SCANNER FAILED: $repo_dir (exit=$status)"
                if [ -s "$err_file" ]; then
                  cat "$err_file"
                fi
              } > "$fail_file"
            elif [ ! -s "$result_file" ]; then
              echo "SCANNER EMPTY OUTPUT: $repo_dir" > "$fail_file"
            fi
          }
          export -f scan_one
          export WORK_DIR

          total=$(find /tmp/corpus-repos -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')

          find /tmp/corpus-repos -mindepth 1 -maxdepth 1 -type d -print0 | \
            xargs -0 -P "$PARALLEL" -I{} bash -c 'scan_one "$1"' _ {}

          shopt -s nullglob
          for fail_file in "$WORK_DIR"/*.fail; do
            fails=$((fails + 1))
            cat "$fail_file" >> "$FAILS"
            echo "" >> "$FAILS"
          done
          for result_file in "$WORK_DIR"/*.jsonl; do
            if [ -s "$result_file" ]; then
              cat "$result_file" >> "$RESULTS"
            fi
          done
          shopt -u nullglob

          rm -rf "$WORK_DIR"

          lines=$(wc -l < "$RESULTS" | tr -d ' ')
          echo "Scanner produced $lines result lines across $total repos ($fails failures)"

          if [ "$total" -gt 0 ] && [ "$((fails * 10))" -gt "$total" ]; then
            echo "::error::Scanner failed on $fails/$total repos (>10%). " \
              "See /tmp/scanner-failures.log (uploaded as artifact)." >&2
            exit 1
          fi

      - name: Compare with ground truth
        env:
          # S9 (no personal email in git history) is unmeasurable from the
          # corpus snapshot — corpus repos have no .git/ directory, so
          # auto-label-full.js emits `na` for all 4533 rows. Allow-list it
          # so the fail-closed gate (compare-results.js) doesn't trip on
          # an inherently unmeasurable check.
          ACCURACY_ALLOW_MISSING: S9
        run: |
          node tests/accuracy/compare-results.js \
            /tmp/scanner-results.jsonl \
            --baseline tests/accuracy/accuracy-baseline.json \
            || { echo "::error::Accuracy regression detected"; exit 1; }

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: accuracy-results
          path: /tmp/scanner-results-accuracy.json
