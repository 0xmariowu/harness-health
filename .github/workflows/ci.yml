name: CI

on:
  push:
    branches:
      - main
  pull_request:
    # No branches filter — run CI on every PR, including stacked PRs targeting feature branches

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 20
          - 22
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint shell script
        run: shellcheck src/scanner.sh

      - name: Check JavaScript syntax
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 20
          - 22
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        run: |
          bash tests/test-scanner.sh
          node tests/test-scorer.js
          node tests/test-plan-generator.js
          node tests/test-reporter.js
          node tests/test-fixer.js
          node tests/test-html-report.js
