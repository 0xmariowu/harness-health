name: CI

on:
  push:
    branches:
      - main
  pull_request:
    # No branches filter — run CI on every PR, including stacked PRs targeting feature branches

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - 20
          - 22
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint shell scripts (warning+error severity)
        # User-facing scripts (src/scanner.sh + everything in scripts/) must
        # stay clean at warning+ severity. Test harnesses get a narrower pass
        # with SC2329 suppressed — `run_test` dynamic dispatch triggers many
        # "function never invoked" false positives.
        run: |
          shellcheck -S warning src/scanner.sh scripts/*.sh
          shellcheck -S warning -e SC2329 tests/*.sh

      - name: Check JavaScript syntax
        run: find src -name '*.js' -print0 | xargs -0 -n1 node --check

  test:
    needs: lint
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        node-version:
          - 20
          - 22
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install jq
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux)   sudo apt-get update && sudo apt-get install -y jq ;;
            macOS)   brew install jq ;;
            Windows) choco install jq -y ;;
          esac

      - name: Toolchain versions
        shell: bash
        run: |
          echo "RUNNER_OS=$RUNNER_OS"
          bash --version | head -1
          node --version
          jq --version
          git --version

      - name: Cross-platform smoke test
        shell: bash
        run: bash tests/windows/smoke.sh

      - name: Run postinstall detection unit test
        shell: bash
        run: node tests/unit/test-postinstall-detection.js

      - name: Prepare deep-analyzer corpus fixture
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p /tmp/al-corpus/small /tmp/al-corpus/medium /tmp/al-corpus/large
          printf '# Small\nbrief.\n' > /tmp/al-corpus/small/CLAUDE.md
          { printf '# Medium\n'; for i in $(seq 1 100); do printf 'line %s of content\n' "$i"; done; } > /tmp/al-corpus/medium/CLAUDE.md
          { printf '# Large\n'; for i in $(seq 1 500); do printf 'line %s of content here\n' "$i"; done; } > /tmp/al-corpus/large/CLAUDE.md

      - name: Run npm test (Linux — full suite)
        # Single source of truth: `npm test` runs exactly the same suite local
        # devs run, so CI cannot drift from the local contract. Extra
        # integration tests that are Linux-specific run as a separate step
        # below.
        if: runner.os == 'Linux'
        shell: bash
        env:
          AL_CORPUS_DIR: /tmp/al-corpus
        run: npm test

      - name: Run Linux-only integration tests (not in npm test)
        # These four aren't part of `npm test` because they exercise
        # install flows / traversal safety / e2e scenarios that need the
        # Linux CI environment, not unit-testable behavior. Keep them
        # wired to CI explicitly rather than folding them into npm test.
        if: runner.os == 'Linux'
        shell: bash
        run: |
          bash tests/test-e2e.sh
          bash tests/test-install-script.sh
          bash tests/robustness/malicious-fixtures.sh
          node tests/fixer-safety/test-traversal.js

  # Aggregator that emits check contexts 'test (20)' and 'test (22)' required by
  # main branch protection. The real test matrix fans out to os x node (6 jobs),
  # whose check names include OS and can't be the required contexts directly.
  test-summary:
    name: test
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - run: echo "test matrix passed for node ${{ matrix.node-version }}"

  npm-e2e:
    needs: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20

      - name: Install jq
        shell: bash
        run: |
          case "$RUNNER_OS" in
            Linux)   sudo apt-get update && sudo apt-get install -y jq ;;
            macOS)   brew install jq ;;
            Windows) choco install jq -y ;;
          esac

      # Path A: Pack the root npm package and install it with --ignore-scripts.
      # The package is self-contained: CLI, installer scripts, postinstall.js,
      # README, and license all ship from the repository root.
      - name: Pack npm tarball
        shell: bash
        run: |
          npm pack
          ls -la agentlint-ai-*.tgz
          TARBALL_DEST="${RUNNER_TEMP:-/tmp}/al.tgz"
          mv agentlint-ai-*.tgz "$TARBALL_DEST"
          echo "TARBALL_PATH=$TARBALL_DEST" >> "$GITHUB_ENV"

      - name: Install globally with --ignore-scripts
        shell: bash
        run: |
          npm install -g --ignore-scripts "$TARBALL_PATH"

      - name: Verify installed root package layout
        shell: bash
        run: |
          PREFIX="$(npm prefix -g)"
          PKG_DIR="$PREFIX/node_modules/agentlint-ai"
          [ -d "$PKG_DIR" ] || PKG_DIR="$PREFIX/lib/node_modules/agentlint-ai"
          PKG="$PKG_DIR/package.json"
          echo "Inspecting: $PKG"
          [ -f "$PKG" ]
          [ -f "$PKG_DIR/postinstall.js" ]
          [ -f "$PKG_DIR/scripts/install.sh" ]
          [ -f "$PKG_DIR/scripts/agentlint.sh" ]
          [ -f "$PKG_DIR/scripts/setup.sh" ]
          [ -f "$PKG_DIR/scripts/generate-metadata.sh" ]
          [ -f "$PKG_DIR/README.md" ]
          [ -f "$PKG_DIR/LICENSE" ]
          # Pass the path via argv so Windows backslashes aren't reinterpreted
          # as JS escape sequences inside a `node -e` source string.
          node -e '
            const p = JSON.parse(require("fs").readFileSync(process.argv[1], "utf8"));
            if (p.name !== "agentlint-ai") {
              console.error("FAIL: unexpected package name:", p.name);
              process.exit(1);
            }
            if (Array.isArray(p.os) || p.os) {
              console.error("FAIL: os field still present in installed package:", JSON.stringify(p.os));
              process.exit(1);
            }
            if (!p.bin
                || p.bin["agentlint-ai"] !== "postinstall.js"
                || p.bin["agent-lint"] !== "scripts/agentlint.sh"
                || p.bin.agentlint !== "scripts/agentlint.sh") {
              console.error("FAIL: bin aliases missing or incorrect:", JSON.stringify(p.bin));
              process.exit(1);
            }
            console.log("OK: root package layout and bin aliases verified");
          ' "$PKG"

      - name: Verify postinstall.js ships with Windows detection
        shell: bash
        run: |
          PREFIX="$(npm prefix -g)"
          PI="$PREFIX/node_modules/agentlint-ai/postinstall.js"
          [ -f "$PI" ] || PI="$PREFIX/lib/node_modules/agentlint-ai/postinstall.js"
          [ -f "$PI" ]
          grep -q "where claude" "$PI"
          grep -q "bash --version" "$PI"
          grep -q "Git for Windows\|WSL" "$PI"

      # Path B: claude-missing graceful degradation
      # Runners don't have `claude` installed. postinstall.js should exit 0
      # (CLI still works standalone) and show "Claude Code not found" in output.
      - name: Path B — assert claude-missing graceful degradation
        shell: bash
        run: |
          set +e
          output=$(node postinstall.js 2>&1)
          code=$?
          set -e
          echo "exit=$code"
          echo "--- output ---"
          echo "$output"
          echo "--- end ---"
          # New behavior: graceful exit 0 when Claude not found
          test "$code" -eq 0
          echo "$output" | grep -qi "Claude Code not found\|CLI is ready\|CLI installed"
