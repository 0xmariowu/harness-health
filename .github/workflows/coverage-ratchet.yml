name: Coverage Ratchet
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ratchet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read baseline coverage
        id: baseline
        run: |
          if [ -f .coverage-baseline ]; then
            BASE=$(cat .coverage-baseline)
          else
            BASE=0
          fi
          echo "baseline=$BASE" >> "$GITHUB_OUTPUT"
      - name: Read PR coverage
        id: pr
        run: |
          if [ -f coverage.txt ]; then
            CURRENT=$(cat coverage.txt)
          else
            CURRENT=0
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
      - name: Compare
        run: |
          BASE=${{ steps.baseline.outputs.baseline }}
          CUR=${{ steps.pr.outputs.current }}
          echo "baseline=$BASE current=$CUR"
          if [ "$CUR" -lt "$BASE" ]; then
            echo "::error::Coverage regressed: $CUR < $BASE"
            exit 1
          fi
          echo "Coverage OK: $CUR >= $BASE"