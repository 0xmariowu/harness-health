name: Diagnose NPM_TOKEN
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
      - name: Check token identity and scope
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          echo "=== npm whoami ==="
          npm whoami
          echo ""
          echo "=== npm token list (this token + sibling tokens) ==="
          npm token list 2>&1 || echo "token list not available (maybe granular token)"
          echo ""
          echo "=== Try publishing a test scope check ==="
          echo "Token can publish to @0xmariowu/foo? (expect success indicator or specific error)"
          npm access list packages @0xmariowu 2>&1 | head -20 || true
          echo ""
          echo "=== Check if granular token ==="
          # Granular tokens can't use `npm token list`, so that already tells us
