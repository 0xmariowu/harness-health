name: Summon Codex on CI Failure

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  summon:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'failure' &&
          github.event.workflow_run.event == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Comment @codex on the failing PR
        uses: actions/github-script@v7
        env:
          FAILED_RUN_URL: ${{ github.event.workflow_run.html_url }}
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        with:
          script: |
            const run = context.payload.workflow_run;
            const prs = run.pull_requests || [];
            if (prs.length === 0) {
              core.info('No associated PR; skipping.');
              return;
            }
            const pr = prs[0];

            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: Number(process.env.FAILED_RUN_ID),
            });
            const failedJobs = jobs.jobs
              .filter(j => j.conclusion === 'failure')
              .map(j => `- ${j.name}: ${j.html_url}`)
              .join('\n') || '(none reported)';

            const body = [
              `@codex **${process.env.WORKFLOW_NAME}** failed on this PR. Please diagnose and fix.`,
              '',
              `**Failed run:** ${process.env.FAILED_RUN_URL}`,
              `**Branch:** \`${process.env.HEAD_BRANCH}\``,
              '',
              '**Failed jobs:**',
              failedJobs,
              '',
              '### Protocol (follow in order)',
              '',
              '**Step 1 — Diagnosis (post as PR comment before any code change):**',
              '- State the single root cause in one sentence.',
              '- Cite the specific log line / file:line that proves it.',
              '',
              '**Step 2 — Fix (push to this PR branch):**',
              '- Apply a minimal, surgical fix targeting the root cause only.',
              '- Keep the diff under 20 lines unless the root cause genuinely requires more (justify if so).',
              '',
              '**Step 3 — Final reply:** root cause + fix rationale + any tradeoffs.',
              '',
              '### HARD RULES (violations will be reverted)',
              '- Do **NOT** change test assertions or expected values to make tests pass. Fix production code, not the test.',
              '- Do **NOT** add lint/type suppressions (`// swiftlint:disable`, `# noqa`, `@ts-ignore`, `// eslint-disable-*`, `#[allow(...)]`, etc.). Fix the underlying issue.',
              '- Do **NOT** refactor code unrelated to the failure.',
              '- Do **NOT** modify CI config, workflow files, Makefiles, or package manifests to skip or weaken checks.',
              '- Do **NOT** delete or skip failing tests.',
              '',
              "If the failure is genuinely environmental (flaky infra, upstream outage, unrelated to code), reply `no code fix needed` with reasoning — do not push.",
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
