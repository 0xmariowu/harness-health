name: Action Self-Test

on:
  pull_request:
    branches:
      - main
    paths:
      - 'action.yml'
      - 'src/**'
      - '.github/workflows/action-test.yml'

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Run AgentLint against self
        id: lint
        uses: ./
        with:
          project-dir: '.'
          fail-below: '0'
          format: 'terminal'

      - name: Verify outputs
        shell: bash
        env:
          AL_SCORE: ${{ steps.lint.outputs.score }}
          AL_SCOPE: ${{ steps.lint.outputs.score-scope }}
          AL_FINDABILITY: ${{ steps.lint.outputs.findability }}
          AL_INSTRUCTIONS: ${{ steps.lint.outputs.instructions }}
          AL_WORKABILITY: ${{ steps.lint.outputs.workability }}
          AL_CONTINUITY: ${{ steps.lint.outputs.continuity }}
          AL_SAFETY: ${{ steps.lint.outputs.safety }}
          AL_HARNESS: ${{ steps.lint.outputs.harness }}
        run: |
          echo "Score: ${AL_SCORE}"
          echo "Scope: ${AL_SCOPE}"
          echo "Findability: ${AL_FINDABILITY}"
          echo "Instructions: ${AL_INSTRUCTIONS}"
          echo "Workability: ${AL_WORKABILITY}"
          echo "Continuity: ${AL_CONTINUITY}"
          echo "Safety: ${AL_SAFETY}"
          echo "Harness: ${AL_HARNESS}"

          # Numeric outputs must be non-empty integers.
          for val in "${AL_SCORE}" "${AL_FINDABILITY}" "${AL_INSTRUCTIONS}" \
                     "${AL_WORKABILITY}" "${AL_CONTINUITY}" "${AL_SAFETY}" \
                     "${AL_HARNESS}"; do
            if [ -z "$val" ]; then
              echo "::error::Empty output detected"
              exit 1
            fi
            if ! [[ "$val" =~ ^[0-9]+$ ]]; then
              echo "::error::Non-numeric output: $val"
              exit 1
            fi
          done

          # score-scope must be exactly "core" in the default Action run.
          # Deep/Session analyzers require an AI sub-agent and local Claude
          # Code session logs — neither available in CI. If this ever flips
          # to "core+extended", the Action grew a side-effect that lets
          # extended dims run in CI, which would be a product regression.
          if [ "${AL_SCOPE}" != "core" ]; then
            echo "::error::score-scope must be 'core' in CI, got '${AL_SCOPE}'"
            exit 1
          fi

          echo "All outputs populated, numeric, and score-scope=core"
