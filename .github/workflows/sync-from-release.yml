name: Sync from Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
      metadata:
        description: 'release-metadata.json content (compact JSON)'
        required: true
      changelog_b64:
        description: 'CHANGELOG.md content (base64)'
        required: true
      security_b64:
        description: 'SECURITY.md content (base64)'
        required: true
      contributing_b64:
        description: 'CONTRIBUTING.md content (base64)'
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Decode and update docs content
        run: |
          VERSION="${{ github.event.inputs.version }}"

          update_doc() {
            local b64="$1" title="$2" position="$3" output="$4"
            printf -- '---\ntitle: %s\nsidebar_position: %s\n---\n\n' "$title" "$position" > "$output"
            echo "$b64" | base64 -d >> "$output"
          }

          update_doc "${{ github.event.inputs.changelog_b64 }}" "Changelog" "6" "docs/content/changelog.md"
          update_doc "${{ github.event.inputs.security_b64 }}" "Security Policy" "5" "docs/content/security.md"
          update_doc "${{ github.event.inputs.contributing_b64 }}" "Contributing" "4" "docs/content/contributing.md"

          echo "Updated changelog, security, contributing for v${VERSION}"

      - name: Commit and push
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/content/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: sync content from agent-lint v${VERSION}"
            git push
            echo "Pushed docs sync for v${VERSION}"
          fi
