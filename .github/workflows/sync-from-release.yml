name: Sync from Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
      metadata:
        description: 'release-metadata.json content (compact JSON)'
        required: true
      changelog_b64:
        description: 'CHANGELOG.md content (base64)'
        required: true
      security_b64:
        description: 'SECURITY.md content (base64)'
        required: true
      contributing_b64:
        description: 'CONTRIBUTING.md content (base64)'
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Create sync branch
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          BRANCH="auto/sync-v${INPUT_VERSION}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Decode and update docs content
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_CHANGELOG_B64: ${{ inputs.changelog_b64 }}
          INPUT_SECURITY_B64: ${{ inputs.security_b64 }}
          INPUT_CONTRIBUTING_B64: ${{ inputs.contributing_b64 }}
        run: |
          update_doc() {
            local b64="$1" title="$2" position="$3" output="$4"
            printf -- '---\ntitle: %s\nsidebar_position: %s\n---\n\n' "$title" "$position" > "$output"
            echo "$b64" | base64 -d >> "$output"
          }

          update_doc "$INPUT_CHANGELOG_B64" "Changelog" "6" "docs/content/changelog.md"
          update_doc "$INPUT_SECURITY_B64" "Security Policy" "5" "docs/content/security.md"
          update_doc "$INPUT_CONTRIBUTING_B64" "Contributing" "4" "docs/content/contributing.md"

          echo "Updated changelog, security, contributing for v${INPUT_VERSION}"

      - name: Commit, push, and create PR
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/content/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "docs: sync content from agent-lint v${INPUT_VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "docs: sync content from agent-lint v${INPUT_VERSION}" \
            --body "Automated sync from agent-lint release v${INPUT_VERSION}." \
            --base main \
            --head "$BRANCH"
          echo "Created PR for docs sync v${INPUT_VERSION}"

      - name: Auto-merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL=$(gh pr list --head "$BRANCH" --json url --jq '.[0].url')
          if [ -n "$PR_URL" ]; then
            gh pr merge "$PR_URL" --auto --squash --delete-branch
            echo "Auto-merge enabled for $PR_URL"
          fi
