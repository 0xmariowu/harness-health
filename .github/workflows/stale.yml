name: Stale

on:
  schedule:
    - cron: '17 9 * * 1'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-pr-message: 'This PR has been inactive for 30 days. It will be closed in 14 days unless there is new activity.'
          close-pr-message: 'Closed due to inactivity. Reopen if still needed.'
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: stale
          exempt-pr-labels: pinned
          stale-issue-message: 'This issue has been inactive for 60 days.'
          close-issue-message: 'Closed due to inactivity. Reopen if still needed.'
          days-before-issue-stale: 60
          days-before-issue-close: 30
          stale-issue-label: stale
          exempt-issue-labels: pinned
