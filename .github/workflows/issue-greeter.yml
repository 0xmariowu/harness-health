name: Issue Greeter

# Auto-greets new issues by @-mentioning Copilot Coding Agent for triage.
# Copilot reads the issue, assesses cloud-async feasibility, and either
# (a) picks up the work itself, or (b) labels `status:needs-claude-session`
# for Claude Code to handle when session is active.
#
# See blueprint:
#   https://github.com/0xmariowu/AgentLint/blob/main/docs/plans/...  (optional)
# Plan:
#   ~/AIMD/cross-project/2026-04-20-ai-native-dev-workflow-overhaul.md §3.7

on:
  issues:
    types: [opened]

permissions:
  issues: write

concurrency:
  group: issue-greeter-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  greet:
    # Skip bot-authored issues (Dependabot, etc.) — they have their own flows.
    if: github.event.issue.user.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Comment triage request to Copilot
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v8.0.0
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name);
            const agentLabel = labels.find(l => l.startsWith('agent:')) || null;

            // Decide the routing hint shown to Copilot based on the agent label.
            let routingHint;
            if (!agentLabel || agentLabel === 'agent:copilot-cloud' || agentLabel === 'agent:any') {
              routingHint = [
                '**Suggested action**: Pick up this issue yourself if it fits cloud-async execution.',
                'Open a branch, implement per Done-when, open a PR with `Closes #' + issue.number + '`.',
                'If it does NOT fit (needs local env, exceeds 60-min limit, or requires deep human judgment),',
                'label `status:needs-claude-session` and reply explaining why.'
              ].join(' ');
            } else if (agentLabel === 'agent:codex-local' || agentLabel === 'agent:claude-local') {
              routingHint = [
                '**Suggested action**: This task is labeled `' + agentLabel + '` — it needs a local execution environment.',
                'Please label `status:needs-claude-session` and reply "Awaiting Claude Code session".',
                'Do NOT try to handle this yourself (you cannot access local CLIs).'
              ].join(' ');
            } else {
              routingHint = '**Suggested action**: Label is `' + agentLabel + '` — proceed per that instruction.';
            }

            const body = [
              '@copilot please triage this issue.',
              '',
              '**Issue**: #' + issue.number + ' — "' + issue.title + '"',
              '**Current labels**: ' + (labels.length ? labels.join(', ') : '(none)'),
              '',
              '## Triage protocol',
              '',
              '1. Read Goal and Done-when from the issue body.',
              '2. Classify fit for cloud-async (no local env, ≤60 min, clear verification).',
              '3. Follow `.github/copilot-instructions.md` hard rules.',
              '4. Execute one of:',
              '   - **You take it** → create branch, implement, open PR with `Closes #' + issue.number + '`',
              '   - **Needs local agent** → label `status:needs-claude-session`, reply why',
              '   - **Unclear / blocked** → label `status:blocked`, reply what you need',
              '',
              routingHint,
              '',
              '---',
              '_Auto-greeted by `issue-greeter.yml`. Blueprint: Four-AI Division._'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: body
            });

            core.notice('Greeted issue #' + issue.number + ' (agent label: ' + (agentLabel || 'none') + ')');
