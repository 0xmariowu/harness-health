name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate tag matches source version
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ -f .claude-plugin/plugin.json ]; then
            PLUGIN_VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
            if [ "$VERSION" != "$PLUGIN_VERSION" ]; then
              echo "::error::Tag v$VERSION does not match plugin.json version $PLUGIN_VERSION"
              echo "::error::Run: scripts/bump-version.sh $VERSION"
              exit 1
            fi
          fi

      - name: Extract changelog for this version
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SAFE_TAG="${TAG//./\\.}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## v${SAFE_TAG}([[:space:]]|$)/{found=1; next} /^## v[0-9]/{if(found) exit} found" CHANGELOG.md | awk 'NF{p=1} p')
          fi
          if [ -n "$NOTES" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "$NOTES" > /tmp/release-notes.md
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          if [ "${{ steps.changelog.outputs.found }}" == "true" ]; then
            gh release create "$TAG" --title "AgentLint ${VERSION}" --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" --title "AgentLint ${VERSION}" --generate-notes
          fi

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cd npm
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npm publish --access public
          rm -f .npmrc
          echo "Published @0xmariowu/agent-lint@${VERSION} to npm"

      - name: Sync to docs repo (AgentLint)
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          METADATA=$(cat release-metadata.json | jq -c .)
          CHANGELOG=$(cat CHANGELOG.md | base64 -w0)
          CHECKS=$(cat docs-source/checks.md 2>/dev/null || echo "" | base64 -w0)
          SCORING=$(cat docs-source/scoring.md 2>/dev/null || echo "" | base64 -w0)
          SECURITY=$(cat SECURITY.md | base64 -w0)
          CONTRIBUTING=$(cat CONTRIBUTING.md | base64 -w0)

          gh workflow run sync-from-release.yml \
            --repo 0xmariowu/AgentLint \
            -f version="$VERSION" \
            -f metadata="$METADATA" \
            -f changelog_b64="$CHANGELOG" \
            -f security_b64="$SECURITY" \
            -f contributing_b64="$CONTRIBUTING"

          echo "Triggered docs sync for v${VERSION}"

      - name: Sync to website repo (agent-lint-simple-green)
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          METADATA=$(cat release-metadata.json | jq -c .)

          gh workflow run sync-from-release.yml \
            --repo 0xmariowu/agent-lint-simple-green \
            -f version="$VERSION" \
            -f metadata="$METADATA"

          echo "Triggered website sync for v${VERSION}"
