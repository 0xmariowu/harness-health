name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least-privilege default for any future job added to this workflow.
# Release job below elevates to contents: write for creating the GitHub Release.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate tag matches source version
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ -f .claude-plugin/plugin.json ]; then
            PLUGIN_VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
            if [ "$VERSION" != "$PLUGIN_VERSION" ]; then
              echo "::error::Tag v$VERSION does not match plugin.json version $PLUGIN_VERSION"
              echo "::error::Run: scripts/bump-version.sh $VERSION"
              exit 1
            fi
          fi

      - name: Validate content sync
        if: steps.check.outputs.exists == 'false'
        run: |
          ACTUAL_CHECKS=$(python3 -c "import json; print(len(json.load(open('standards/weights.json'))['check_weights']))")
          META_CHECKS=$(python3 -c "import json; print(json.load(open('release-metadata.json'))['check_count'])")
          ACTUAL_DIMS=$(python3 -c "import json; print(len(json.load(open('release-metadata.json'))['dimensions']))")

          if [ "$ACTUAL_CHECKS" != "$META_CHECKS" ]; then
            echo "::error::release-metadata.json check_count ($META_CHECKS) != actual ($ACTUAL_CHECKS)"
            echo "::error::Run: scripts/bump-version.sh"
            exit 1
          fi

          if ! grep -q "checks-${ACTUAL_CHECKS}-" README.md; then
            echo "::error::README.md badge does not contain checks-${ACTUAL_CHECKS}"
            echo "::error::Run: scripts/bump-version.sh"
            exit 1
          fi

          # Derive core/extended counts from evidence.json so the drift
          # check tolerates legitimate core/extended/total phrasings like
          # "51 core checks + 7 extended" alongside the total count.
          # Without this, any `N dimensions` that doesn't equal ACTUAL_DIMS
          # was flagged as stale — including the correct "6 core dimensions"
          # phrasing every live doc uses. See post-remediation-deep-review
          # P0-4.
          CORE_CHECKS=$(python3 -c "
          import json
          ev = json.load(open('standards/evidence.json'))['checks']
          print(sum(1 for c in ev.values() if c.get('scope') == 'core'))
          ")
          EXT_CHECKS=$(python3 -c "
          import json
          ev = json.load(open('standards/evidence.json'))['checks']
          print(sum(1 for c in ev.values() if c.get('scope') == 'extended'))
          ")
          CORE_DIMS=6
          EXT_DIMS=2

          ALLOWED_CHECKS="$ACTUAL_CHECKS|$CORE_CHECKS|$EXT_CHECKS"
          ALLOWED_DIMS="$ACTUAL_DIMS|$CORE_DIMS|$EXT_DIMS"

          echo "Allowed check counts near the word 'check[s]': $ALLOWED_CHECKS"
          echo "Allowed dim counts near the word 'dimension[s]': $ALLOWED_DIMS"

          drift=0
          for f in README.md docs/content/intro.md; do
            [ -f "$f" ] || continue
            bad_checks=$(grep -oE "[0-9]+ check[s]?[^a-zA-Z0-9]" "$f" | grep -oE "^[0-9]+" | sort -u | grep -vxE "$ALLOWED_CHECKS" || true)
            bad_dims=$(grep -oE "[0-9]+ dimension[s]?[^a-zA-Z0-9]" "$f" | grep -oE "^[0-9]+" | sort -u | grep -vxE "$ALLOWED_DIMS" || true)
            if [ -n "$bad_checks" ]; then
              echo "::error::$f has stale check count(s): $bad_checks (allowed: $ALLOWED_CHECKS)"
              drift=1
            fi
            if [ -n "$bad_dims" ]; then
              echo "::error::$f has stale dimension count(s): $bad_dims (allowed: $ALLOWED_DIMS)"
              drift=1
            fi
          done
          if [ "$drift" -eq 1 ]; then
            echo "::error::Run: scripts/bump-version.sh (and verify sed patterns match current prose)"
            exit 1
          fi

          echo "Validated: $ACTUAL_CHECKS total ($CORE_CHECKS core + $EXT_CHECKS extended), $ACTUAL_DIMS dimensions"

      - name: Extract changelog for this version
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SAFE_TAG="${TAG//./\\.}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## v${SAFE_TAG}([[:space:]]|$)/{found=1; next} /^## v[0-9]/{if(found) exit} found" CHANGELOG.md | awk 'NF{p=1} p')
          fi
          if [ -n "$NOTES" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "$NOTES" > /tmp/release-notes.md
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          if [ "${{ steps.changelog.outputs.found }}" == "true" ]; then
            gh release create "$TAG" --title "AgentLint ${VERSION}" --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" --title "AgentLint ${VERSION}" --generate-notes
          fi

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npm publish --access public
          rm -f .npmrc
          echo "Published agentlint-ai@${VERSION} to npm"

      - name: Sync to website repo (agent-lint-simple-green)
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          METADATA=$(jq -c . release-metadata.json)

          if [ -n "$GH_TOKEN" ]; then
            gh workflow run sync-release.yml \
              --repo 0xmariowu/agent-lint-simple-green \
              -f version="$VERSION" \
              -f metadata="$METADATA" \
              || echo "::warning::Website sync failed (check CROSS_REPO_TOKEN)"
          else
            echo "::warning::Skipping website sync (CROSS_REPO_TOKEN not configured)"
          fi

      - name: Comment on closed issues referenced in CHANGELOG
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SAFE_TAG="${VERSION//./\\.}"

          # Extract issue numbers from this version's CHANGELOG section only.
          # The awk pattern matches '## v0.7.1 ...' as start and stops at the
          # next '## v...' header so we never pick up numbers from older entries.
          if [ ! -f CHANGELOG.md ]; then
            echo "::warning::CHANGELOG.md not found; skipping issue notification"
            exit 0
          fi

          SECTION=$(awk "/^## v${SAFE_TAG}([[:space:]]|$)/{f=1;next} /^## v[0-9]/{f=0} f" CHANGELOG.md)
          if [ -z "$SECTION" ]; then
            echo "No CHANGELOG section for v${VERSION}; skipping issue notification"
            exit 0
          fi

          ISSUES=$(printf '%s\n' "$SECTION" | grep -oE '#[0-9]+' | sort -u | tr -d '#')
          if [ -z "$ISSUES" ]; then
            echo "No issues referenced in v${VERSION} CHANGELOG; nothing to notify"
            exit 0
          fi

          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"
          BODY=$(printf '%s\n\n%s\n' \
            "Shipped in [v${VERSION}](${RELEASE_URL})." \
            "If anything here regressed or you hit a follow-up issue, reopen this or file a new one — happy to take another look.")

          for num in $ISSUES; do
            # Only comment if the reference resolves to an actual issue (not a
            # PR from this repo, not a dangling number from some other source).
            TYPE=$(gh api "repos/${{ github.repository }}/issues/${num}" --jq '.pull_request // empty | if . then "pr" else "issue" end' 2>/dev/null || echo "missing")
            case "$TYPE" in
              issue)
                echo "Commenting on #${num}"
                gh issue comment "$num" --repo "${{ github.repository }}" --body "$BODY" \
                  || echo "::warning::Failed to post comment on #${num}"
                ;;
              pr)
                echo "Skipping #${num} (PR, not an issue)"
                ;;
              missing)
                echo "::warning::Cannot resolve #${num}; skipping"
                ;;
            esac
          done

      - name: Summary
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          {
            echo "## Released ${VERSION}"
            echo "- GitHub Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"
            echo "- npm: [agentlint-ai@${VERSION}](https://www.npmjs.com/package/agentlint-ai)"
          } >> "$GITHUB_STEP_SUMMARY"
