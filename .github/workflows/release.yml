name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate tag matches source version
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ -f .claude-plugin/plugin.json ]; then
            PLUGIN_VERSION=$(python3 -c "import json; print(json.load(open('.claude-plugin/plugin.json'))['version'])")
            if [ "$VERSION" != "$PLUGIN_VERSION" ]; then
              echo "::error::Tag v$VERSION does not match plugin.json version $PLUGIN_VERSION"
              echo "::error::Run: scripts/bump-version.sh $VERSION"
              exit 1
            fi
          fi

      - name: Extract changelog for this version
        if: steps.check.outputs.exists == 'false'
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SAFE_TAG="${TAG//./\\.}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## v${SAFE_TAG}([[:space:]]|$)/{found=1; next} /^## v[0-9]/{if(found) exit} found" CHANGELOG.md | awk 'NF{p=1} p')
          fi
          if [ -n "$NOTES" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "$NOTES" > /tmp/release-notes.md
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          if [ "${{ steps.changelog.outputs.found }}" == "true" ]; then
            gh release create "$TAG" --title "AgentLint ${VERSION}" --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" --title "AgentLint ${VERSION}" --generate-notes
          fi
