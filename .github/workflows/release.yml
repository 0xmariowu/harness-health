name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Least-privilege default for any future job added to this workflow.
# Release job below elevates to contents: write for creating the GitHub Release.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # `git merge-base --is-ancestor` below needs the full history of
          # both the tag commit and origin/main to compute ancestry — a
          # shallow checkout (default depth=1) gives a false negative.
          fetch-depth: 0

      # P0-2-tag (2026-04-26): refuse to publish a tag whose commit is not
      # already on origin/main. Without this gate, anyone with tag-push
      # permission could trigger npm publish + GitHub Release + the moving
      # `v1` tag from a commit that never passed main's required CI gates.
      - name: Verify tag SHA is an ancestor of origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME points at $GITHUB_SHA, which is NOT an ancestor of origin/main."
            echo "::error::Refusing to publish from an unmerged commit. Cherry-pick / merge to main first, then re-tag."
            exit 1
          fi
          echo "Tag SHA is an ancestor of origin/main; ancestor gate passes."

      # P0-2-tag (2026-04-26): also require that all required CI checks for
      # this commit reported `success`. Required checks are declared in
      # branch-protection.yml and enforced on `main`, but a tag push event
      # bypasses branch protection — this Checks API gate restores the same
      # contract on the tag flow.
      - name: Verify required CI checks passed on tag SHA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Read the required-context names from branch-protection.yml so
          # this gate stays in sync with the declared main protection
          # automatically (PR #209 review feedback: hard-coded list drifted
          # from the actual `contexts:` block, and a space-delimited string
          # word-split names like `lint (20)` into 3 tokens).
          mapfile -t REQUIRED < <(python3 - <<'PY'
          path = '.github/branch-protection.yml'
          in_contexts = False
          with open(path, encoding='utf-8') as f:
              for raw in f:
                  line = raw.rstrip()
                  s = line.strip()
                  if s.startswith('#') or not s:
                      continue
                  if s.startswith('contexts:'):
                      in_contexts = True
                      continue
                  if in_contexts and s.startswith('- '):
                      print(s[2:].strip())
                  elif in_contexts and not line.startswith(' '):
                      in_contexts = False
          PY
          )
          if [ "${#REQUIRED[@]}" -eq 0 ]; then
            echo "::error::Could not read required contexts from .github/branch-protection.yml"
            exit 1
          fi
          echo "Required contexts (${#REQUIRED[@]}): ${REQUIRED[*]}"

          # Fetch every check-run for this SHA. Pages of 100 are the max
          # GitHub returns; loop until we get a partial page.
          # Squash-merges occasionally don't fire `push` events for the
          # resulting main commit (observed on PRs #211/#212), leaving the
          # tag SHA with no required check-runs even though the parent
          # squash-merge commit had a full green CI matrix. Fall back to
          # the first parent SHA when the tag SHA itself is empty.
          fetch_runs_for_sha() {
            local sha="$1"
            local page=1
            local rows=""
            while :; do
              chunk=$(gh api "repos/$GITHUB_REPOSITORY/commits/$sha/check-runs?per_page=100&page=$page" \
                --jq '.check_runs[] | "\(.name)\t\(.conclusion // "pending")"')
              [ -z "$chunk" ] && break
              rows="${rows}${chunk}"$'\n'
              local count
              count=$(printf '%s\n' "$chunk" | wc -l | tr -d ' ')
              [ "$count" -lt 100 ] && break
              page=$((page + 1))
            done
            printf '%s' "$rows"
          }
          # Resolve a single required context against a rows blob. Accepts:
          #   - exact match: a check-run named exactly `$name`
          #   - matrix children: a check-run whose name starts with `$name (`
          #     (so required `lint` is satisfied by `lint (20)` / `lint (22)`,
          #     required `npm-e2e` by `npm-e2e (ubuntu-latest)`, etc).
          # Returns one of:
          #   "success"    — at least one matching run reached success
          #   "pending"    — at least one matching run exists but none success yet
          #   "<other>"    — at least one matching run finished non-success
          #   "missing"    — no matching run at all
          # Picks the BEST result (success > pending > failure) so a passing
          # matrix child outweighs a still-running peer.
          resolve_required() {
            local rows="$1" name="$2"
            local prefix="${name} ("
            local result="missing"
            while IFS=$'\t' read -r run_name conclusion; do
              [ -z "$run_name" ] && continue
              if [ "$run_name" = "$name" ] || [ "${run_name#"$prefix"}" != "$run_name" ]; then
                if [ "$conclusion" = "success" ]; then
                  echo "success"; return
                fi
                if [ "$conclusion" = "pending" ] || [ -z "$conclusion" ]; then
                  result="pending"
                elif [ "$result" != "pending" ]; then
                  result="$conclusion"
                fi
              fi
            done < <(printf '%s' "$rows")
            echo "$result"
          }

          # Try the gate up to 6 times with a 30s wait between attempts so a
          # concurrent ci.yml on the same SHA has a chance to land. Exit
          # success as soon as every required context resolves to success.
          attempt=1
          max_attempts=6
          while :; do
            tag_rows=$(fetch_runs_for_sha "$GITHUB_SHA")
            # Squash-merges sometimes don't fire `push` events on the new
            # main commit (observed on PRs #211/#212/#213). Pull the parent
            # SHA's check-runs as a SEPARATE blob — the ancestor check
            # above already proved the tag SHA is on origin/main, so its
            # parent is also on main. Parent results are used ONLY to fill
            # gaps where the tag SHA has no matching run; a recorded
            # failure on the tag SHA is never overridden by a parent
            # success (PR #214 review feedback).
            parent=$(git rev-parse "${GITHUB_SHA}^" 2>/dev/null || echo "")
            parent_rows=""
            [ -n "$parent" ] && parent_rows=$(fetch_runs_for_sha "$parent")

            missing=(); failed=(); pending=()
            for name in "${REQUIRED[@]}"; do
              status=$(resolve_required "$tag_rows" "$name")
              # Only fall back to the parent when the tag SHA had NO
              # matching run at all. This keeps a tag-SHA failure from
              # being masked by a parent-SHA success.
              if [ "$status" = "missing" ] && [ -n "$parent_rows" ]; then
                status=$(resolve_required "$parent_rows" "$name")
              fi
              case "$status" in
                success) ;;
                missing) missing+=("$name") ;;
                pending) pending+=("$name") ;;
                *)       failed+=("$name=$status") ;;
              esac
            done

            if [ "${#missing[@]}" -eq 0 ] && [ "${#failed[@]}" -eq 0 ] && [ "${#pending[@]}" -eq 0 ]; then
              echo "All ${#REQUIRED[@]} required CI checks reported success."
              break
            fi

            # Hard fail on a definitive non-success — pending alone we can wait out,
            # but a recorded failure / cancellation will not get better by waiting.
            if [ "${#failed[@]}" -gt 0 ]; then
              echo "::error::Required-checks gate failed (attempt ${attempt}) for tag $GITHUB_REF_NAME on SHA $GITHUB_SHA"
              echo "::error::Non-success required checks: ${failed[*]}"
              [ "${#missing[@]}" -gt 0 ] && echo "::error::Also missing: ${missing[*]}"
              [ "${#pending[@]}" -gt 0 ] && echo "::error::Also pending: ${pending[*]}"
              exit 1
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Required-checks gate timed out after ${attempt} attempts for tag $GITHUB_REF_NAME on SHA $GITHUB_SHA"
              [ "${#missing[@]}" -gt 0 ] && echo "::error::Still missing: ${missing[*]}"
              [ "${#pending[@]}" -gt 0 ] && echo "::error::Still pending: ${pending[*]}"
              exit 1
            fi

            echo "::notice::Required-checks gate attempt ${attempt}/${max_attempts}: missing=${#missing[@]} pending=${#pending[@]}; sleeping 30s before retry"
            attempt=$((attempt + 1))
            sleep 30
          done

      - name: Check if release already exists
        id: check
        run: |
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate tag matches source version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          python3 - "$VERSION" <<'PY'
          import json
          import sys

          expected = sys.argv[1]
          checks = [
              ('package.json', ['version']),
              ('.claude-plugin/plugin.json', ['version']),
              ('.claude-plugin/marketplace.json', ['metadata', 'version']),
              ('.claude-plugin/marketplace.json', ['plugins', 0, 'version']),
              ('release-metadata.json', ['version']),
          ]

          failed = False
          for file_name, path in checks:
              with open(file_name, encoding='utf-8') as f:
                  value = json.load(f)
              for key in path:
                  value = value[key]
              if value != expected:
                  dotted = '.'.join(str(part) for part in path)
                  print(f'::error::Tag v{expected} does not match {file_name} {dotted} {value}')
                  failed = True

          if failed:
              print(f'::error::Run: scripts/bump-version.sh {expected}')
              sys.exit(1)
          PY

      - name: Validate content sync
        run: |
          ACTUAL_CHECKS=$(python3 -c "import json; print(len(json.load(open('standards/weights.json'))['check_weights']))")
          META_CHECKS=$(python3 -c "import json; print(json.load(open('release-metadata.json'))['check_count'])")
          ACTUAL_DIMS=$(python3 -c "import json; print(len(json.load(open('release-metadata.json'))['dimensions']))")

          if [ "$ACTUAL_CHECKS" != "$META_CHECKS" ]; then
            echo "::error::release-metadata.json check_count ($META_CHECKS) != actual ($ACTUAL_CHECKS)"
            echo "::error::Run: scripts/bump-version.sh"
            exit 1
          fi

          if ! grep -q "checks-${ACTUAL_CHECKS}-" README.md; then
            echo "::error::README.md badge does not contain checks-${ACTUAL_CHECKS}"
            echo "::error::Run: scripts/bump-version.sh"
            exit 1
          fi

          # Derive core/extended counts from evidence.json so the drift
          # check tolerates legitimate core/extended/total phrasings like
          # "51 core checks + 7 extended" alongside the total count.
          # Without this, any `N dimensions` that doesn't equal ACTUAL_DIMS
          # was flagged as stale — including the correct "6 core dimensions"
          # phrasing every live doc uses. See post-remediation-deep-review
          # P0-4.
          CORE_CHECKS=$(python3 -c "
          import json
          ev = json.load(open('standards/evidence.json'))['checks']
          print(sum(1 for c in ev.values() if c.get('scope') == 'core'))
          ")
          EXT_CHECKS=$(python3 -c "
          import json
          ev = json.load(open('standards/evidence.json'))['checks']
          print(sum(1 for c in ev.values() if c.get('scope') == 'extended'))
          ")
          CORE_DIMS=6
          EXT_DIMS=2

          ALLOWED_CHECKS="$ACTUAL_CHECKS|$CORE_CHECKS|$EXT_CHECKS"
          ALLOWED_DIMS="$ACTUAL_DIMS|$CORE_DIMS|$EXT_DIMS"

          echo "Allowed check counts near the word 'check[s]': $ALLOWED_CHECKS"
          echo "Allowed dim counts near the word 'dimension[s]': $ALLOWED_DIMS"

          drift=0
          for f in README.md docs/content/intro.md; do
            [ -f "$f" ] || continue
            bad_checks=$(grep -oE "[0-9]+ check[s]?[^a-zA-Z0-9]" "$f" | grep -oE "^[0-9]+" | sort -u | grep -vxE "$ALLOWED_CHECKS" || true)
            bad_dims=$(grep -oE "[0-9]+ dimension[s]?[^a-zA-Z0-9]" "$f" | grep -oE "^[0-9]+" | sort -u | grep -vxE "$ALLOWED_DIMS" || true)
            if [ -n "$bad_checks" ]; then
              echo "::error::$f has stale check count(s): $bad_checks (allowed: $ALLOWED_CHECKS)"
              drift=1
            fi
            if [ -n "$bad_dims" ]; then
              echo "::error::$f has stale dimension count(s): $bad_dims (allowed: $ALLOWED_DIMS)"
              drift=1
            fi
          done
          if [ "$drift" -eq 1 ]; then
            echo "::error::Run: scripts/bump-version.sh (and verify sed patterns match current prose)"
            exit 1
          fi

          echo "Validated: $ACTUAL_CHECKS total ($CORE_CHECKS core + $EXT_CHECKS extended), $ACTUAL_DIMS dimensions"

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          SAFE_TAG="${TAG//./\\.}"
          NOTES=""
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk "/^## v${SAFE_TAG}([[:space:]]|$)/{found=1; next} /^## v[0-9]/{if(found) exit} found" CHANGELOG.md | awk 'NF{p=1} p')
          fi
          if [ -n "$NOTES" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "$NOTES" > /tmp/release-notes.md
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if npm version already exists
        id: npm
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if npm view "agentlint-ai@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::agentlint-ai@${VERSION} is already published. npm versions are immutable, so this tag rerun will skip npm publish. Use a new version for new package contents."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "agentlint-ai@${VERSION} is not published yet; npm publish will run."
          fi

      - name: Publish to npm
        if: steps.npm.outputs.exists == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Publish npm first. If GitHub Release creation fails after this,
          # rerunning or manually creating the release is recoverable; a GitHub
          # Release that exists without an npm package is user-visible drift.
          trap 'rm -f .npmrc' EXIT
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > .npmrc
          npm publish --access public
          echo "Published agentlint-ai@${VERSION} to npm"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::GitHub Release ${TAG} already exists; editing it instead of creating a duplicate."
            if [ "${{ steps.changelog.outputs.found }}" == "true" ]; then
              gh release edit "$TAG" --title "AgentLint ${VERSION}" --notes-file /tmp/release-notes.md
            else
              gh release edit "$TAG" --title "AgentLint ${VERSION}"
            fi
          else
            if [ "${{ steps.changelog.outputs.found }}" == "true" ]; then
              gh release create "$TAG" --title "AgentLint ${VERSION}" --notes-file /tmp/release-notes.md
            else
              gh release create "$TAG" --title "AgentLint ${VERSION}" --generate-notes
            fi
          fi

      - name: Update moving v1 tag
        if: startsWith(github.ref, 'refs/tags/v1.')
        run: |
          git tag -f v1 ${{ github.sha }}
          git push --force origin refs/tags/v1

      - name: Sync to website repo (agent-lint-simple-green)
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          METADATA=$(jq -c . release-metadata.json)

          if [ -n "$GH_TOKEN" ]; then
            gh workflow run sync-release.yml \
              --repo 0xmariowu/agent-lint-simple-green \
              -f version="$VERSION" \
              -f metadata="$METADATA" \
              || echo "::warning::Website sync failed (check CROSS_REPO_TOKEN)"
          else
            echo "::warning::Skipping website sync (CROSS_REPO_TOKEN not configured)"
          fi

      - name: Comment on closed issues referenced in CHANGELOG
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SAFE_TAG="${VERSION//./\\.}"

          # Extract issue numbers from this version's CHANGELOG section only.
          # The awk pattern matches '## v0.7.1 ...' as start and stops at the
          # next '## v...' header so we never pick up numbers from older entries.
          if [ ! -f CHANGELOG.md ]; then
            echo "::warning::CHANGELOG.md not found; skipping issue notification"
            exit 0
          fi

          SECTION=$(awk "/^## v${SAFE_TAG}([[:space:]]|$)/{f=1;next} /^## v[0-9]/{f=0} f" CHANGELOG.md)
          if [ -z "$SECTION" ]; then
            echo "No CHANGELOG section for v${VERSION}; skipping issue notification"
            exit 0
          fi

          ISSUES=$(printf '%s\n' "$SECTION" | grep -oE '#[0-9]+' | sort -u | tr -d '#')
          if [ -z "$ISSUES" ]; then
            echo "No issues referenced in v${VERSION} CHANGELOG; nothing to notify"
            exit 0
          fi

          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"
          BODY=$(printf '%s\n\n%s\n' \
            "Shipped in [v${VERSION}](${RELEASE_URL})." \
            "If anything here regressed or you hit a follow-up issue, reopen this or file a new one — happy to take another look.")

          for num in $ISSUES; do
            # Only comment if the reference resolves to an actual issue (not a
            # PR from this repo, not a dangling number from some other source).
            TYPE=$(gh api "repos/${{ github.repository }}/issues/${num}" --jq '.pull_request // empty | if . then "pr" else "issue" end' 2>/dev/null || echo "missing")
            case "$TYPE" in
              issue)
                echo "Commenting on #${num}"
                gh issue comment "$num" --repo "${{ github.repository }}" --body "$BODY" \
                  || echo "::warning::Failed to post comment on #${num}"
                ;;
              pr)
                echo "Skipping #${num} (PR, not an issue)"
                ;;
              missing)
                echo "::warning::Cannot resolve #${num}; skipping"
                ;;
            esac
          done

      - name: Summary
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          {
            echo "## Release ${VERSION}"
            echo "- GitHub Release: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"
            echo "- npm: [agentlint-ai@${VERSION}](https://www.npmjs.com/package/agentlint-ai)"
            if [ "${{ steps.npm.outputs.exists }}" = "true" ]; then
              echo "- npm publish: skipped because agentlint-ai@${VERSION} is already published"
            else
              echo "- npm publish: completed"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
