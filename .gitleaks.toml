# .gitleaks.toml — PII detection for public repos

title = "PII Ruleset"

[extend]
useDefault = true

# ── Always-block rules ───────────────────────────────────────────────────────

[[rules]]
id = "personal-path"
description = "Personal home directory path leaked"
regex = '''/Users/[a-zA-Z0-9_\-\.]+/|/home/[a-z][a-z0-9_\-]+/'''
tags = ["pii", "personal-path"]
keywords = ["/Users/", "/home/"]

[[rules]]
id = "tailscale-domain"
description = "Tailscale network address or internal hostname leaked"
regex = '''[a-z0-9\-]+\.ts\.net'''
tags = ["pii", "hostname"]
keywords = [".ts.net"]

# ── Allowlist ────────────────────────────────────────────────────────────────

[allowlist]
description = "Project-level allowlist"
paths = [
  '''\.gitleaks\.toml$''',
  '''README\.md$''',
  '''CHANGELOG\.md$''',
  '''docs/content/changelog\.md$''',
  '''docs/checks\.md$''',
  '''docs/scoring\.md$''',
  '''standards/evidence\.json$''',
  '''^templates/''',
]
